name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  actions: write

env:
  SIGNPATH_ORG_ID: 'c9bd44ce-a067-4f9a-9135-468d00ed0b13'
  SIGNPATH_PROJECT_SLUG: 'DriverStoreExplorer'
  SIGNPATH_SIGNING_POLICY_SLUG: 'release-signing'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download CI artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $name = "DriverStoreExplorer-v${{ inputs.version }}-unsigned"
          $resp = gh api "repos/${{ github.repository }}/actions/artifacts?name=$name&per_page=1" | ConvertFrom-Json
          if ($resp.total_count -eq 0) { throw "Artifact '$name' not found from CI" }
          $id = $resp.artifacts[0].id
          Write-Host "Found artifact ID: $id"
          gh api "repos/${{ github.repository }}/actions/artifacts/$id/zip" > artifact.zip
          Expand-Archive artifact.zip -DestinationPath ci-build
          Remove-Item artifact.zip

      - name: Upload unsigned artifact for SignPath
        id: upload-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: DriverStoreExplorer-v${{ inputs.version }}-unsigned
          path: ci-build/

      - name: Submit signing request to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed-artifact

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path signed-artifact/* -DestinationPath "DriverStoreExplorer-v${{ inputs.version }}.zip"

      - name: Generate release highlights
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-highlights.lock.yml -f version="v${{ inputs.version }}"
          Start-Sleep -Seconds 10

          # Find the triggered run (most recent in_progress or queued)
          $run = $null
          for ($i = 0; $i -lt 24; $i++) {
            $runs = gh run list --workflow=release-highlights.lock.yml --limit=5 --json databaseId,status,createdAt | ConvertFrom-Json
            $run = $runs | Where-Object { $_.status -in @("in_progress", "queued", "waiting", "pending") } | Select-Object -First 1
            if ($run) { break }
            # Also check if it already completed (fast run)
            $run = $runs | Where-Object { $_.createdAt -gt (Get-Date).AddMinutes(-2).ToString("yyyy-MM-ddTHH:mm:ssZ") } | Select-Object -First 1
            if ($run) { break }
            Start-Sleep -Seconds 5
          }
          if (-not $run) { throw "Could not find release highlights run" }

          Write-Host "Waiting for release highlights run $($run.databaseId)..."
          do {
            Start-Sleep -Seconds 30
            $status = (gh run view $run.databaseId --json status,conclusion | ConvertFrom-Json)
            Write-Host "  Status: $($status.status)"
          } while ($status.status -ne "completed")

          if ($status.conclusion -ne "success") {
            Write-Host "Release highlights finished with conclusion: $($status.conclusion)"
          } else {
            Write-Host "Release highlights completed successfully"
          }

          # Download the artifact
          gh run download $run.databaseId -n release-highlights -D highlights-output
          if (Test-Path highlights-output/release-highlights.md) {
            Write-Host "Release highlights downloaded"
          } else {
            Write-Host "No highlights artifact found, will use --generate-notes"
          }

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $args = @(
            "v${{ inputs.version }}"
            "DriverStoreExplorer-v${{ inputs.version }}.zip"
            "--title", "DriverStore Explorer v${{ inputs.version }}"
            "--draft"
          )
          if (Test-Path highlights-output/release-highlights.md) {
            $args += "--notes-file"
            $args += "highlights-output/release-highlights.md"
          } else {
            $args += "--generate-notes"
          }
          gh release create @args
